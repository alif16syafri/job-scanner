# =============================================================================
# Remote QA Job Scanner - configuration
# Edit this file to control what gets scanned, filtered, and where results go.
# =============================================================================

# --- What to look for ---------------------------------------------------------
# A job matches if its title/description contains at least one of these keywords.
# Case-insensitive. Whole-word-ish matching (see core.py) to avoid noise.
keywords:
  - "qa"
  - "q/a"
  - "quality assurance"
  - "quality engineer"
  - "sdet"
  - "test engineer"
  - "test automation"
  - "automation engineer"
  - "software tester"
  - "software test"
  - "qa engineer"
  - "qa automation"

# Optional: title MUST contain one of these to count (leave empty to disable).
# Useful to cut down false positives from job descriptions that merely mention QA.
title_must_include:
  - "qa"
  - "quality"
  - "sdet"
  - "test"
  - "tester"

# Seniority tags to highlight (jobs are still shown if they don't match; these
# just get a "senior" flag and float to the top of the HTML dashboard).
seniority_boost:
  - "senior"
  - "sr."
  - "sr "
  - "lead"
  - "staff"
  - "principal"

# --- Filtering ----------------------------------------------------------------
filters:
  # Only keep jobs posted within this many days. Set to 0 to disable.
  max_age_days: 14
  # Drop jobs whose title contains any of these words (reduce noise).
  exclude_title_words:
    - "manager"        # remove if you want QA Manager roles too
    - "internship"
    - "intern"
    - "part-time"
  # We only want remote roles. Most sources here are remote-only already,
  # but this also scans text for these hints when a location is present.
  remote_hints:
    - "remote"
    - "anywhere"
    - "worldwide"
    - "distributed"

# --- Region / timezone flagging (flag only, does NOT filter out) --------------
# Each region has substrings we look for in the location/region text.
# Jobs get labelled with matching regions in the output. These are aligned with
# the priority tiers below (Indonesia > GCC > SEA/Asia).
region_flags:
  Indonesia:
    - "indonesia"
    - "jakarta"
    - "bandung"
    - "surabaya"
    - "yogyakarta"
    - ".co.id"
    - ".id"
  SEA:
    - "sea"
    - "southeast asia"
    - "south east asia"
    - "singapore"
    - "malaysia"
    - "kuala lumpur"
    - "philippines"
    - "manila"
    - "thailand"
    - "bangkok"
    - "vietnam"
    - "hanoi"
    - "apac"
  Asia:
    - "asia"
    - "hong kong"
    - "japan"
    - "tokyo"
    - "taiwan"
    - "taipei"
    - "south korea"
    - "seoul"
  ANZ:
    - "australia"
    - "sydney"
    - "melbourne"
    - "brisbane"
    - "perth"
    - "new zealand"
    - "auckland"
    - "wellington"
    - "anz"
  GCC:
    - "gcc"
    - "gulf"
    - "united arab emirates"
    - "uae"
    - "dubai"
    - "abu dhabi"
    - "saudi arabia"
    - "riyadh"
    - "qatar"
    - "doha"
    - "bahrain"
    - "kuwait"
    - "oman"
  Europe:
    - "europe"
    - "emea"
    - "united kingdom"
    - "germany"
    - "netherlands"
    - "amsterdam"
    - "berlin"
    - "london"
    - "france"
    - "paris"
    - "spain"
    - "portugal"
    - "poland"
    - "ireland"
    - "cet"
    - "cest"
    - "gmt"
  Worldwide:
    - "worldwide"
    - "anywhere"
    - "global"

# --- Priority scoring (rank only -- never hides jobs) -------------------------
# Ranks matched jobs so your top priorities float to the top of the dashboard.
# Each tier lists substrings to look for in the job's text (title/location/etc).
# A job's priority_tier is the highest-weighted tier it matches; `score` is the
# sum of all matched tier points plus the small boosts below. Nothing is
# filtered out -- this only affects ordering and the badge shown in the output.
priority_scoring:
  enabled: true
  tiers:
    # Tier 1 -- Indonesian companies (highest priority).
    # `reuse_indonesia_dorks: true` also scores jobs whose COMPANY matches
    # google_dorks.indonesia.companies (Gojek, Tokopedia, ...) or whose URL is on
    # a .co.id/.id domain -- so the dork list and scoring share one source of truth.
    - name: "Indonesia"
      points: 100
      reuse_indonesia_dorks: true
      match:
        - "indonesia"
        - "jakarta"
        - "bandung"
        - "surabaya"
        - "yogyakarta"
        - ".co.id"
        - ".id"
    # Tier 2 -- Gulf / Middle East (remote; relocation ok).
    - name: "GCC"
      points: 60
      match:
        - "united arab emirates"
        - "uae"
        - "dubai"
        - "abu dhabi"
        - "saudi arabia"
        - "riyadh"
        - "qatar"
        - "doha"
        - "bahrain"
        - "kuwait"
        - "oman"
        - "gulf"
    # Tier 3 -- Southeast Asia + broader Asia.
    - name: "SEA/Asia"
      points: 40
      match:
        - "singapore"
        - "malaysia"
        - "philippines"
        - "thailand"
        - "vietnam"
        - "southeast asia"
        - "apac"
        - "hong kong"
        - "japan"
        - "taiwan"
        - "south korea"
        - "asia"
    # Tier 3b -- Australia & New Zealand (same weight as SEA/Asia).
    - name: "ANZ"
      points: 40
      match:
        - "australia"
        - "sydney"
        - "melbourne"
        - "brisbane"
        - "perth"
        - "new zealand"
        - "auckland"
        - "wellington"
    # Tier 4 -- Europe (lowest priority; surfaced but ranks below the rest).
    - name: "Europe"
      points: 20
      match:
        - "europe"
        - "emea"
        - "united kingdom"
        - "germany"
        - "netherlands"
        - "amsterdam"
        - "berlin"
        - "london"
        - "france"
        - "paris"
        - "spain"
        - "portugal"
        - "poland"
        - "ireland"
        - "cet"
        - "cest"
  # Small additive boosts (applied on top of tier points).
  boosts:
    senior: 8          # title looks senior (see seniority_boost)
    remote: 5          # text mentions remote/anywhere/worldwide
    has_salary: 3      # a salary was parsed
  remote_terms:
    - "remote"
    - "anywhere"
    - "worldwide"
    - "distributed"

# --- Sources ------------------------------------------------------------------
sources:
  remoteok:
    enabled: true
  remotive:
    enabled: true
  weworkremotely:
    enabled: true
  himalayas:
    enabled: true

  # Arbeitnow -- free, no key. Europe-heavy remote+onsite feed (paginated).
  arbeitnow:
    enabled: true
    max_pages: 5

  # Jobicy -- free, no key. Remote-only listings, queried for QA-ish terms.
  jobicy:
    enabled: true

  # Working Nomads -- free, no key. Broad remote-jobs JSON feed.
  workingnomads:
    enabled: true

  # Jobspresso -- free, no key. Curated remote jobs via WordPress RSS.
  jobspresso:
    enabled: true

  # NoDesk -- free, no key. Remote jobs RSS (title-only: "Role at Company",
  # no location/salary in the feed).
  nodesk:
    enabled: true

  # Adzuna -- OPTIONAL, needs a free key (developer.adzuna.com). Does NOT cover
  # Indonesia/GCC, so it's off by default. Set ADZUNA_APP_ID / ADZUNA_APP_KEY and
  # list the countries Adzuna supports that you care about (e.g. sg, in).
  adzuna:
    enabled: false
    app_id_env: "ADZUNA_APP_ID"
    app_key_env: "ADZUNA_APP_KEY"
    countries:
      - "sg"
      - "in"
    queries:
      - "QA Engineer"
      - "SDET"
      - "Test Automation"
    max_pages: 1
    results_per_page: 50

  # Jooble -- OPTIONAL, needs a free key (jooble.org/api/about). Global aggregator
  # that DOES cover Indonesia + GCC, so it's the best optional add for those.
  # Set JOOBLE_API_KEY, then flip enabled to true.
  jooble:
    enabled: false
    api_key_env: "JOOBLE_API_KEY"
    keywords:
      - "QA Engineer"
      - "SDET"
      - "Test Automation Engineer"
    locations:
      - "Indonesia"
      - "United Arab Emirates"
      - "Qatar"
      - "Singapore"
      - "Remote"
    max_pages: 1

  # Greenhouse-hosted company boards. Add the company's board token (the slug in
  # the URL: boards.greenhouse.io/<slug>). Examples below are illustrative --
  # replace with companies you care about.
  greenhouse:
    enabled: true
    companies:
      - "gitlab"
      - "figma"
      - "airbnb"
      # - "yourtargetcompany"

  # Lever-hosted company boards. Slug from jobs.lever.co/<slug>.
  # NOTE: many big companies aren't on Lever. "leverdemo" is Lever's public
  # demo board and is handy for testing. Replace with real target companies.
  lever:
    enabled: true
    companies:
      - "leverdemo"
      # - "yourtargetcompany"

  # LinkedIn / Indeed are NOT scraped (ToS + anti-bot). Instead we generate
  # ready-to-click search URLs you can open in a browser.
  search_url_helper:
    enabled: true
    queries:
      - "Senior QA Engineer"
      - "QA Automation Engineer"
      - "SDET"

# --- Google dorking (clickable search links, NOT scraped) ---------------------
# We build ready-to-click Google search URLs ("dorks") that surface company
# career pages, ATS boards, and LinkedIn jobs -- scoped to your priority regions
# (Indonesia first, then SEA/Asia and GCC). Google blocks automated scraping, so
# these are links you open in a browser.
google_dorks:
  enabled: true

  # --- Indonesia focus (top priority) ----------------------------------------
  # Indonesian companies rarely use the Western ATS platforms below, so we dork
  # local domains and local job boards directly.
  indonesia:
    enabled: true
    # Dork Indonesian domains, e.g. site:.co.id / site:.id with the role terms.
    domains:
      - "co.id"
      - "id"
    # Indonesian / SEA job boards that host local company postings.
    local_boards:
      - "kalibrr.com"
      - "glints.com"
      - "jobstreet.co.id"
      - "id.jobstreet.com"
      - "techinasia.com/jobs"
      - "dealls.com"

  # Role phrases to search for. "reuse_keywords: true" pulls from the top-level
  # `keywords` list; anything in `roles` below is added on top.
  reuse_keywords: true
  roles:
    - "Senior QA Engineer"
    - "QA Automation Engineer"
    - "SDET"
    - "Test Automation Engineer"

  # ATS / job-board domains to target with `site:` operators. These host most
  # company career pages, so dorking them finds jobs across many companies.
  ats_sites:
    - "boards.greenhouse.io"
    - "job-boards.greenhouse.io"
    - "jobs.lever.co"
    - "jobs.ashbyhq.com"
    - "apply.workable.com"
    - "*.recruitee.com"
    - "*.myworkdayjobs.com"
    - "*.bamboohr.com"
    - "jobs.smartrecruiters.com"
    - "careers.google.com"

  # LinkedIn jobs dorks (site:linkedin.com/jobs). Google indexes public LinkedIn
  # job posts, so this often surfaces roles without hitting LinkedIn's anti-bot.
  linkedin:
    enabled: true
    # Extra terms appended to LinkedIn dorks (e.g. remote emphasis).
    extra_terms: "remote"

  # Native LinkedIn job-search deeplinks by location. These open LinkedIn's own
  # filtered results directly (via geoId), not a Google dork. geoId values are
  # LinkedIn's Bing-Geo IDs -- find more by searching a location on LinkedIn and
  # copying the geoId= from the URL. `f_TPR` maps freshness to LinkedIn's own
  # time filter, `f_WT: 2` = remote workplace type.
  linkedin_locations:
    enabled: true
    remote_only: true          # append f_WT=2 (remote) to each deeplink
    sort_recent: true          # sort by most recent (sortBy=DD)
    locations:
      - {name: "Indonesia", geoId: "102478259"}
      - {name: "EMEA", geoId: "91000000"}
      - {name: "Southeast Asia", geoId: "102393603"}
      - {name: "Singapore", geoId: "102454443"}
      - {name: "Australia", geoId: "101452733"}
      - {name: "Malaysia", geoId: "106808692"}

  # Generic career-page dorks that don't rely on a known ATS domain.
  # Uses intitle:/inurl: to catch self-hosted "careers"/"jobs" pages.
  generic_career:
    enabled: true

  # Extra boards that have NO usable public API/feed (scraping = ToS/ban risk or
  # paywall). Instead we generate one Google `site:` dork per board per region,
  # so you get one-click search without scraping.
  extra_boards:
    enabled: true
    sites:
      - "wellfound.com"
      - "flexjobs.com"
      - "dynamitejobs.com"

  # Region scoping. Each region expands into an OR-group of location terms that
  # get appended to dorks, e.g. ("Singapore" OR "Indonesia" OR ...).
  # Set `regions_enabled` to control which ones are generated. Order reflects
  # priority: SEA (incl. Indonesia) and Asia first, then GCC, then Europe last.
  regions_enabled:
    - "SEA"
    - "ASIA"
    - "ANZ"
    - "GCC"
    - "EUROPE"
  regions:
    SEA:   # Southeast Asia (Indonesia gets its own dedicated dorks above too)
      - "Indonesia"
      - "Singapore"
      - "Malaysia"
      - "Philippines"
      - "Thailand"
      - "Vietnam"
      - "Southeast Asia"
      - "APAC"
    ASIA:  # Broader East Asia -- excludes China and India per preference
      - "Hong Kong"
      - "Japan"
      - "Taiwan"
      - "South Korea"
    ANZ:   # Australia & New Zealand
      - "Australia"
      - "New Zealand"
    GCC:   # Gulf Cooperation Council (remote; relocation ok)
      - "United Arab Emirates"
      - "Dubai"
      - "Abu Dhabi"
      - "Saudi Arabia"
      - "Riyadh"
      - "Qatar"
      - "Doha"
      - "Bahrain"
      - "Kuwait"
      - "Oman"
    EUROPE:  # Lowest priority -- surfaced but ranked below the rest
      - "Europe"
      - "EMEA"
      - "United Kingdom"
      - "Germany"
      - "Netherlands"
      - "France"
      - "Spain"
      - "Portugal"
      - "Poland"
      - "Ireland"

  # Only surface recent postings via Google's time filter.
  # Options: "" (any), d (24h), w (past week), m (past month), y (past year).
  freshness: "m"

  # Fully custom dork templates. Use {role} and {region} placeholders; they get
  # expanded for every role x enabled-region combination. Leave empty to skip.
  # Example: 'site:*.smartrecruiters.com "{role}" "{region}"'
  custom_templates: []

# --- Output -------------------------------------------------------------------
output:
  dir: "output"
  csv: true
  html: true
  json: false            # set true if you want raw JSON too

# --- Telegram notifications ---------------------------------------------------
# Leave token/chat_id empty to disable. In GitHub Actions these come from the
# TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID environment variables / secrets.
telegram:
  enabled: true
  # These are read from env vars first; only used as a fallback if set here.
  bot_token_env: "TELEGRAM_BOT_TOKEN"
  chat_id_env: "TELEGRAM_CHAT_ID"
  # Max number of jobs to push per run (avoid flooding).
  max_notifications: 15
  # Only notify about NEW jobs not seen in previous runs (uses seen-cache).
  only_new: true

# --- State (dedup / "new job" detection) --------------------------------------
state:
  seen_cache_file: "output/seen_jobs.json"
